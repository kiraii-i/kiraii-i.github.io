<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GuitarPedal — ESP32 Controller</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — Dark · Olive · White
═══════════════════════════════════════════ */
:root {
  --bg:         #0b0c09;
  --bg2:        #111209;
  --bg3:        #161810;
  --surface:    #1a1c12;
  --surface2:   #21241a;
  --border:     #2a2e1e;
  --border2:    #343a25;

  --olive:      #6b7c2f;
  --olive-l:    #8a9e3a;
  --olive-ll:   #a8bf47;
  --olive-d:    #4a5620;
  --olive-glow: rgba(107,124,47,0.35);

  --white:      #f0f2e8;
  --white-d:    #c8ccb8;
  --white-dd:   #8a8e7a;
  --muted:      #4a4e3a;

  --red:        #c0392b;
  --red-l:      #e74c3c;
  --amber:      #d4830a;
  --amber-l:    #f39c12;
  --teal:       #1a6b5c;
  --teal-l:     #27ae8f;

  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;

  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;
  --r-xl: 22px;
  --r-full: 999px;

  --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-md: 0 6px 24px rgba(0,0,0,0.5);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.6);
  --olive-shadow: 0 0 20px rgba(107,124,47,0.2);
}

/* ─── RESET ─── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { height: 100%; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--sans);
  min-height: 100%;
  overflow-x: hidden;
  position: relative;
}

/* Background texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 600px 400px at 15% 10%, rgba(107,124,47,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 400px 600px at 85% 90%, rgba(107,124,47,0.05) 0%, transparent 70%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%236b7c2f' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.z1 { position: relative; z-index: 1; }

/* ─── TYPOGRAPHY ─── */
.mono { font-family: var(--mono); }
.label-xs { font-family: var(--mono); font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--white-dd); }
.label-sm { font-family: var(--mono); font-size: .7rem; letter-spacing: .08em; text-transform: uppercase; }

/* ─── LAYOUT ─── */
.app {
  max-width: 430px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.header {
  background: rgba(11,12,9,0.95);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}

.header-left { display: flex; align-items: center; gap: 11px; }

.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--olive-d) 0%, var(--olive) 60%, var(--olive-l) 100%);
  clip-path: polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  position: relative;
  animation: logoGlow 4s ease-in-out infinite;
}
@keyframes logoGlow {
  0%,100% { filter: drop-shadow(0 0 6px var(--olive-glow)); }
  50% { filter: drop-shadow(0 0 14px rgba(107,124,47,0.6)); }
}

.header-title { line-height: 1; }
.header-title h1 { font-size: .95rem; font-weight: 800; color: var(--white); letter-spacing: -.01em; }
.header-title p { font-family: var(--mono); font-size: .55rem; color: var(--olive-l); letter-spacing: .18em; margin-top: 2px; }

/* Connection badge */
.conn-badge {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: var(--r-full);
  border: 1px solid;
  font-family: var(--mono);
  font-size: .62rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .3s;
  letter-spacing: .04em;
}
.conn-badge.disconnected {
  border-color: var(--border2);
  color: var(--muted);
  background: transparent;
}
.conn-badge.connected {
  border-color: var(--olive-d);
  color: var(--olive-ll);
  background: rgba(107,124,47,0.1);
}
.conn-badge.connecting {
  border-color: var(--amber);
  color: var(--amber-l);
  background: rgba(212,131,10,0.08);
  animation: connPulse .8s ease-in-out infinite;
}
@keyframes connPulse { 0%,100%{opacity:1} 50%{opacity:.5} }

.conn-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  transition: all .3s;
}
.disconnected .conn-dot { background: var(--muted); }
.connected .conn-dot { background: var(--olive-ll); box-shadow: 0 0 6px var(--olive-glow); animation: dotBlink 2s ease infinite; }
.connecting .conn-dot { background: var(--amber-l); }
@keyframes dotBlink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ═══════════════════════════════════════════
   CONNECTION OVERLAY
═══════════════════════════════════════════ */
.connect-overlay {
  position: fixed; inset: 0;
  background: rgba(11,12,9,0.97);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: opacity .4s;
}
.connect-overlay.hidden { opacity: 0; pointer-events: none; }

.connect-panel {
  width: 90%;
  max-width: 340px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-xl);
  padding: 32px 28px;
  box-shadow: var(--shadow-lg);
}

.connect-icon {
  width: 56px; height: 56px;
  background: rgba(107,124,47,0.12);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  margin: 0 auto 20px;
}

.connect-panel h2 {
  text-align: center;
  font-size: 1.2rem;
  font-weight: 800;
  margin-bottom: 6px;
  color: var(--white);
}
.connect-panel p {
  text-align: center;
  font-size: .8rem;
  color: var(--white-dd);
  line-height: 1.6;
  margin-bottom: 24px;
}

.input-group { margin-bottom: 14px; }
.input-group label {
  display: block;
  font-family: var(--mono);
  font-size: .62rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--white-dd);
  margin-bottom: 6px;
}
.input-group input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--r-md);
  padding: 10px 14px;
  color: var(--white);
  font-family: var(--mono);
  font-size: .85rem;
  outline: none;
  transition: border-color .2s;
}
.input-group input:focus { border-color: var(--olive); }
.input-group input::placeholder { color: var(--muted); }

.btn-connect {
  width: 100%;
  padding: 13px;
  background: var(--olive);
  color: var(--bg);
  border: none;
  border-radius: var(--r-md);
  font-family: var(--sans);
  font-size: .9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .25s;
  letter-spacing: .02em;
  margin-top: 6px;
}
.btn-connect:hover { background: var(--olive-l); transform: translateY(-1px); }
.btn-connect:active { transform: translateY(0); }

.connect-hint {
  text-align: center;
  font-family: var(--mono);
  font-size: .62rem;
  color: var(--muted);
  margin-top: 16px;
  line-height: 1.6;
}
.connect-hint code {
  color: var(--olive-l);
  background: rgba(107,124,47,0.1);
  padding: 1px 5px;
  border-radius: 3px;
}

.demo-link {
  display: block;
  text-align: center;
  margin-top: 12px;
  font-family: var(--mono);
  font-size: .65rem;
  color: var(--olive);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* Additional styles continue... */
</style>
</head>
<body>

<!-- ═══ TOAST ═══ -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════
     CONNECTION OVERLAY
═══════════════════════════════════════════ -->
<div class="connect-overlay" id="connectOverlay">
  <div class="connect-panel">
    <div class="connect-icon">📡</div>
    <h2>Connect to Pedal</h2>
    <p>Connect your phone to the ESP32 WiFi network, then enter the pedal's IP address below.</p>

    <div class="input-group">
      <label>ESP32 IP Address</label>
      <input type="text" id="ipInput" value="192.168.4.1" placeholder="192.168.4.1" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>

    <div class="input-group">
      <label>WiFi Network (on your phone)</label>
      <input type="text" id="ssidInput" value="GuitarPedal" placeholder="GuitarPedal" autocomplete="off" readonly style="color:var(--muted)">
    </div>

    <button class="btn-connect" onclick="connectToPedal()">Connect to Pedal</button>

    <a class="demo-link" onclick="startDemo()">↳ No hardware? Try Demo Mode</a>

    <div class="connect-hint">
      <div>1. Connect phone WiFi to <code>GuitarPedal</code></div>
      <div>2. Password: <code>guitar1234</code></div>
      <div>3. Enter IP <code>192.168.4.1</code> above</div>
    </div>
  </div>
</div>

<!-- APP (simplified for this response) -->
<div class="app z1">
  <!-- Header and main content would continue here -->
</div>

<script>
// ═══════════════════════════════════════════
// Demo Mode - Start without hardware
// ═══════════════════════════════════════════
function startDemo() {
  // Hide connection overlay
  document.getElementById('connectOverlay').classList.add('hidden');
  
  // Set mock connection state
  window.isDemo = true;
  window.isConnected = true;
  
  // Update connection badge to show connected
  const badge = document.getElementById('connBadge');
  badge.classList.remove('disconnected', 'connecting');
  badge.classList.add('connected');
  document.getElementById('connLabel').textContent = 'Demo Mode';
  
  // Update status card
  const statusPing = document.getElementById('statusPing');
  const statusText = document.getElementById('statusText');
  if (statusPing && statusText) {
    statusPing.classList.add('live');
    statusText.textContent = 'Demo Mode Active';
  }
  
  // Show toast notification
  showToast('Demo mode activated! All controls are simulated.');
  
  // Initialize demo state
  initializeDemoMode();
}

// Initialize demo mode with mock data
function initializeDemoMode() {
  // Initialize demo state for effects, tuner, looper, etc.
  window.demoState = {
    masterVolume: 80,
    isBypassed: false,
    activeEffect: null,
    tunerNote: 'E',
    tunerFreq: 329.63,
    looperActive: false,
  };
}

// Show toast notification
function showToast(message) {
  const toast = document.getElementById('toast');
  if (toast) {
    toast.textContent = message;
    toast.classList.add('show');
    
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }
}

// Placeholder function for actual connection
function connectToPedal() {
  const ip = document.getElementById('ipInput').value;
  console.log('Attempting to connect to:', ip);
  // Actual connection logic would go here
}

// Initialize
function showConnectOverlay() {
  const overlay = document.getElementById('connectOverlay');
  if (overlay) {
    overlay.classList.remove('hidden');
  }
}

// Setup on page load
document.addEventListener('DOMContentLoaded', function() {
  // Connection overlay starts visible
  const overlay = document.getElementById('connectOverlay');
  if (overlay) {
    overlay.classList.remove('hidden');
  }
});
</script>

</body>
</html>
